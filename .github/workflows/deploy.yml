name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Permissions needed to deploy to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Enable Pages (build type "workflow") if it isn't already, so the very
          # first deploy doesn't fail with "Get Pages site failed".
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          # The site is static and lives at the repo root.
          path: "."

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

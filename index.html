<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#160f28" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GTA7" />
  <title>GTA 7 · Neon City</title>
  <link rel="manifest" href="manifest.webmanifest?v=v2" />
  <link rel="icon" type="image/png" href="assets/favicon.png?v=v2" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png?v=v2" />
  <link rel="stylesheet" href="style.css?v=v2" />
</head>
<body>
  <!-- Home -->
  <div id="screen-home" class="screen">
    <div class="box-home">
      <h1 id="home-title" class="game-title">Game</h1>
      <p id="home-tagline" class="subtitle"></p>
      <label id="home-name-label" class="name-label" for="place-name-input">Name your place:</label>
      <input id="place-name-input" type="text" maxlength="20" />
      <button id="btn-start" class="btn btn-giant">New game</button>
      <button id="btn-continue" class="btn btn-secondary">Continue</button>
      <p id="home-msg" class="home-msg"></p>
      <button id="btn-refresh" class="btn-refresh" title="Clear cache and reload">🔄 Refresh (clear cache)</button>
      <div id="app-version" class="app-version"></div>
    </div>
  </div>

  <!-- Character creation -->
  <div id="screen-create" class="screen hidden">
    <div class="box-create">
      <h2 id="create-title">Choose your character</h2>
      <div id="avatar-preview" class="avatar-preview"></div>
      <div id="create-controls" class="create-controls"></div>
      <button id="btn-create-ok" class="btn btn-giant">Let's go!</button>
    </div>
  </div>

  <!-- Game -->
  <div id="screen-game" class="screen hidden">
    <header class="top-bar">
      <div class="bar-line">
        <div class="place-title">🚗 <span id="place-name">My Place</span></div>
        <div class="hud-actions">
          <button id="btn-goals" class="mini-btn" title="Goals">🎯</button>
          <button id="btn-me" class="mini-btn" title="Change my look">🧍</button>
          <button id="btn-help" class="mini-btn" title="Help">❓</button>
        </div>
      </div>
      <div id="hud-resources" class="resources"></div>
    </header>

    <div id="game-message" class="game-message hidden"></div>

    <div class="world-zone">
      <div id="world"></div>
      <button id="btn-action" class="btn-action hidden">Action</button>
    </div>

    <div id="panel" class="panel">
      <p class="panel-hint"></p>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <button id="btn-close-modal" class="btn-close">✖</button>
      <h2 id="modal-title">Title</h2>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- Close-up mini-scene (generic): zoom onto a backdrop and scrub spots off it -->
  <div id="closeup" class="closeup hidden">
    <button id="closeup-close" class="closeup-close" aria-label="Close">✖</button>
    <div id="closeup-stage" class="closeup-stage">
      <img id="closeup-bg" class="closeup-bg" alt="" draggable="false" />
      <img id="closeup-brush" class="closeup-brush hidden" alt="" draggable="false" />
    </div>
  </div>

  <!-- Night veil ("rest" transition), fullscreen -->
  <div id="night-veil"></div>

  <script src="vendor/phaser.min.js?v=v2"></script>
  <script src="game.config.js?v=v2"></script>
  <script src="engine.js?v=v2"></script>
</body>
</html>
